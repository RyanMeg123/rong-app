services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rong-shudong-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      API_VERSION: v1
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rong_shudong
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: 1234567890abcdef1234567890abcdef
      JWT_REFRESH_SECRET: abcdef1234567890abcdef1234567890
      JWT_ACCESS_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      SENTRY_DSN: ""
      CORS_ORIGIN: http://localhost:8081
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: rong-shudong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rong_shudong
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rong_shudong"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: rong-shudong-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
